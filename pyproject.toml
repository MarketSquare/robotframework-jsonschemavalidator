[project]
name = "robotframework-jsonvalidator"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Mickel Jacobs", email = "avenstar90@gmail.com" }
]
requires-python = ">=3.11,<4.0"
dependencies = [
    "jsonschema>=4.26.0",
    "robotframework>=7.4.1",
    "tabulate>=0.9.0",
]

# [project.scripts]
# robotframework-jsonvalidator = "jsonvalidator:JsonValidator"

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "JsonValidator"
module-root = ""

[dependency-groups]
dev = [
    "black>=26.1.0",
    "jsonschema>=4.26.0",
    "robotcode>=2.2.0",
    "robotframework>=7.4.1",
    "ruff>=0.14.14",
    "tabulate>=0.9.0",
]
