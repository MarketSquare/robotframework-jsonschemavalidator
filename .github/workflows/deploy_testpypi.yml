name: Build and Publish to TestPyPI
 
on:
 push:
  branches:
   - main


jobs:
  build_package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with: 
            persist-credentials: false
 
      - name: Set up UV
        uses: astral-sh/setup-uv@v7.6.0
        with:
          version: '0.11.1' # Use the latest Python 3 version
    
