name: Publish package

on:
  # Automatisch na GitHub Release
  release:
    types: [published]

  # Handmatig starten met keuze
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        type: choice
        default: testpypi
        options:
          - testpypi
          - pypi

permissions:
  contents: read
  id-token: write   # nodig voor trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest

    # Dynamisch environment kiezen
    environment: ${{ github.event_name == 'release' && 'testpypi' }}

    steps:
      - name: Checkout exact release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build package
        run: uv build

      - name: Publish | TestPyPI
        if: github.event_name == 'release' || inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          
      - name: Guard Rail
        if: github.event_name == 'release' && inputs.target == 'pypi'
        run: exit 1

      - name: Publish | PyPi
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'pypi'
        run: exit 1 
