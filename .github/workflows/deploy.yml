name: Publish to PyPi

on:
  # Manual Dispatch of release
 workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        type: choice
        default: pypi
        options:
          - pypi
       
permissions:
  contents: read
  id-token: write   # nodig voor trusted publishing

jobs:
  publish_pypi:
    runs-on: ubuntu-latest

    # Dynamisch environment kiezen
    environment: 'pypi'

    steps:
      - name: Checkout exact release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build package
        run: uv build

      - name: Publish | PyPi
        uses: pypa/gh-action-pypi-publish@release/v1
  
  create_documents:
    needs: publish_pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7.6.0
        with:
          version: 0.11.2
          python-version: 3.14

      - name: install project
        run: uv sync

      - name: Generate Robot Framework Libdoc
        run: |
          VERSION=$(uv version --short)
          uv run libdoc --version "$VERSION" src/JsonSchemaValidator docs/index.html

      - name: Commit generated Libdoc
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(robot): update libdoc"
          file_pattern: docs/index.html


