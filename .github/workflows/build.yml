name: Build package

on: push

jobs:
  build:
    name: build with uv
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with: 
        persist-credentials: false
    - name: Setup UV
      uses: astral-sh/setup-uv@v7.6.0
      with: 
        version: 0.11.1
    - name: Install Python
      run: uv python install 3.11
    - name: Build
      run: uv build
      
